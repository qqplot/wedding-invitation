<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 결혼합니다</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nanum Myeongjo', serif;
            color: #333;
            line-height: 1.6;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 480px; /* 모바일 너비 제한 */
            margin: 0 auto;
            background: #fff;
            text-align: center;
        }
        /* 메인 섹션 */
        .main-visual {
            padding: 50px 20px;
            background-color: #fffaf0;
        }
        .main-visual h1 { font-size: 1.5rem; letter-spacing: 2px; }
        .main-img { width: 100%; height: auto; margin: 20px 0; border-radius: 5px; }

        /* 정보 섹션 */
        .info-section { padding: 40px 20px; }
        .date { font-size: 1.2rem; font-weight: bold; color: #8a7b6a; }
        
        /* 버튼 스타일 */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            background-color: #8a7b6a;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <section class="main-visual">
        <p>SAVE THE DATE</p>
        <h1>김철수 & 이영희</h1>
        <img src="https://via.placeholder.com/400x600" alt="메인사진" class="main-img">
        <p class="date">2026. 10. 24. SAT PM 12:30</p>
        <p>행복예식장 1층 그랜드홀</p>
    </section>

    <hr style="border: 0; height: 1px; background: #eee; margin: 0 40px;">

    <section class="info-section">
        <h3>초대합니다</h3>
        <p>
            서로가 마주 보며 다져온 사랑을<br>
            이제 함께 한곳을 바라보며 걸어가려 합니다.<br>
            저희의 시작을 함께 축복해 주세요.
        </p>
    </section>

    <section class="info-section" style="background: #fdfdfd;">
        <a href="tel:01000000000" class="btn">신랑에게 전화하기</a>
        <a href="https://map.kakao.com" target="_blank" class="btn">지도 보기</a>
    </section>
</div>

</body>
</html>
