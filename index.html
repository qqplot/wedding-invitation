<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채규병 & 양수진 결혼합니다</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 기존 CSS와 동일 (생략 없이 그대로 사용하시면 됩니다) */
        body { margin: 0; padding: 0; font-family: 'Nanum Myeongjo', serif; color: #333; line-height: 1.8; background-color: #f9f9f9; text-align: center; }
        .container { max-width: 480px; margin: 0 auto; background: #fff; padding-bottom: 50px; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        section { padding: 50px 20px; }
        .title { font-size: 1.1rem; letter-spacing: 3px; color: #8a7b6a; margin-bottom: 30px; display: block; font-weight: bold;}
        .main-visual { background-color: #fffaf0; padding-top: 30px;}
        .main-img { width: 90%; height: auto; border-radius: 2px; margin: 20px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .names { font-size: 1.4rem; font-weight: bold; margin: 20px 0; }
        .greeting-poem { font-size: 0.95rem; color: #555; margin-bottom: 40px; }
        .greeting-text { font-size: 1rem; margin-bottom: 40px; }
        .family-info { font-size: 1rem; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 30px 0; margin: 0 30px; }
        .family-row { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 5px 0; }
        .parent { color: #777; font-size: 0.9rem; }
        .relation { font-size: 0.85rem; color: #999; }
        .child { font-weight: bold; font-size: 1.05rem; }
        .map-section { background-color: #fdfdfd; }
        .location-info { margin-bottom: 20px; }
        .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px 20px; background: #fff; border: 1px solid #8a7b6a; color: #8a7b6a; text-decoration: none; border-radius: 5px; font-size: 0.85rem; transition: 0.3s; }
        .btn:hover { background: #8a7b6a; color: #fff; }
        
        /* 갤러리 섹션 */
        .gallery-section { background-color: #fff; }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            padding: 0 10px;
        }
        .gallery-item {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            overflow: hidden;
            border-radius: 2px;
            background-color: #f0f0f0; /* 사진 로딩 전 보여질 배경색 */
        }
        .gallery-item img {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>

<div class="container">
    <section class="gallery-section">
        <span class="title">GALLERY</span>
        <div class="gallery-grid" id="auto-gallery">
        </div>
    </section>

    </div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const galleryGrid = document.getElementById('auto-gallery');
        let imageIndex = 1;
        const folderPath = 'images/'; // 사진이 있는 폴더 경로
        const extension = '.jpg';     // 확장자 (반드시 소문자 .jpg 로 통일해주세요)

        function loadNextImage() {
            const imgElement = new Image();
            imgElement.src = folderPath + imageIndex + extension;

            // 이미지가 성공적으로 로드된 경우 (파일이 존재함)
            imgElement.onload = function() {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.appendChild(imgElement);
                galleryGrid.appendChild(div);
                
                imageIndex++; 
                loadNextImage(); // 다음 번호 이미지 시도
            };

            // 이미지가 없는 경우 (여기서 로딩 종료)
            imgElement.onerror = function() {
                console.log("총 " + (imageIndex - 1) + "장의 사진을 불러왔습니다.");
                
                // 만약 1번 사진도 없다면 안내 문구 표시
                if (imageIndex === 1) {
                    galleryGrid.style.display = 'block';
                    galleryGrid.innerHTML = '<p style="color:#999; font-size:0.9rem;">사진을 준비 중입니다.</p>';
                }
            };
        }

        // 첫 번째 이미지부터 로딩 시작
        loadNextImage();
    });
</script>

</body>
</html>
